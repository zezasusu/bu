<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>POPZA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />

<style>
body {
  margin: 0;
  font-family: 'Noto Sans Thai', sans-serif;
  background: #f5f5f5;
}

header {
  text-align: center;
  padding: 20px;
}

.main-title {
  font-size: 28px;
  font-weight: bold;
}

.sub-title {
  font-size: 16px;
  opacity: 0.7;
}

.ar-section {
  padding: 20px;
  text-align: center;
}

.head-title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 5px;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 14px;
}
</style>
</head>

<body>

<header>
  <div class="main-title">A&D</div>
  <div class="sub-title">3D model (AR)</div>
</header>

<div class="ar-section">
  <div class="head-title">ZEZA</div>
  <div class="sub-title">popzasusu</div>

  <model-viewer
    src="zezacharacter.glb"
    ios-src="zezacharacter.usdz"
    poster="preview.jpg"
    ar
    ar-placement="floor"
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    environment-image="neutral"
    loading="eager"
    style="width: 100%; height: 400px;">
  </model-viewer>

</div>

<footer>
  <div><strong>Facebook:</strong> 
    <a href="https://www.facebook.com/mushroomsstudio" target="_blank">
      facebook.com/mushroomsstudio
    </a>
  </div>
  <div><strong>Website:</strong> 
    <a href="https://www.mushroom-studio.com" target="_blank">
      mushroom-studio.com
    </a>
  </div>
</footer>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

</body>
</html>
