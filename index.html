<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>POPZA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
  <div class="main-title">A&D</div>
  <div class="sub-title">3D model (AR)</div>
</header>

<!-- ZEZA -->
<div class="ar-section">
  <!-- ✅ แก้เครื่องหมายคำพูดให้ถูก -->
  <div class="head-title">ZEZA</div>
  <div class="sub-title">popzasusu</div>

  <model-viewer id="model1"
    src="zezacharacter.glb"
    ios-src="zezacharacter.usdz"
    ar
    ar-placement="floor"
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    environment-image="neutral"
    loading="eager"
    style="width: 100%; height: 400px;">
  </model-viewer>

  <button class="ar-button" onclick="triggerAR('model1')">
    Play AR
  </button>
</div>

<footer>
  <div class="footer-link">
    <strong>Facebook:</strong>
    <a href="https://www.facebook.com/mushroomsstudio" target="_blank">
      facebook.com/mushroomsstudio
    </a>
  </div>

  <div class="footer-link">
    <strong>Website:</strong>
    <a href="https://www.mushroom-studio.com" target="_blank">
      mushroom-studio.com
    </a>
  </div>
</footer>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<script>
function triggerAR(id) {
  const viewer = document.getElementById(id);
  if (!viewer) return;

  if (viewer.canActivateAR) {
    viewer.activateAR();
  } else {
    alert("อุปกรณ์นี้ไม่รองรับ AR หรือยังไม่พร้อมใช้งาน");
  }
}
</script>

</body>
</html>
