<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>POPZA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

</head>

<body>

<header>
  <div class="main-title">A&D</div>
  <div class="sub-title">3D model (AR)</div>
</header>


<!-- MODEL 1 -->
<div class="ar-section">

  <div class="head-title">ZEZA</div>
  <div class="sub-title">popzasusu</div>

  <model-viewer id="model1"
    src="zezacharacter.glb"
    ios-src="zezacharacter.usdz"
    ar
    ar-placement="floor"
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    environment-image="neutral"
    loading="eager"
    style="width:100%; height:400px;">
  </model-viewer>

  <button class="ar-button" onclick="triggerAR('model1')">
    Play AR
  </button>

</div>


<!-- MODEL 2 -->
<div class="ar-section">

  <div class="head-title">ZEZA</div>
  <div class="sub-title">santaza</div>

  <model-viewer id="model2"
    src="artoy.glb"
    ios-src="artoy.usdz"
    ar
    ar-placement="floor"
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    environment-image="neutral"
    loading="eager"
    style="width:100%; height:400px;">
  </model-viewer>

  <button class="ar-button" onclick="triggerAR('model2')">
    Play AR
  </button>

</div>


  <!-- MODEL 3 -->
<div class="ar-section">

  <div class="head-title">ZEZA</div>
  <div class="sub-title">Room of Dreams</div>

  <model-viewer id="model2"
    src="arroom.glb"
    ios-src="arroom.usdz"
    ar
    ar-placement="floor"
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    environment-image="neutral"
    loading="eager"
    style="width:100%; height:400px;">
  </model-viewer>

  <button class="ar-button" onclick="triggerAR('model2')">
    Play AR
  </button>

</div>



  
<footer>


  <div class="footer-link">
    <strong>Instagram:</strong>
    <a href="https://www.instagram.com/zeza_bear/" target="_blank">
      instagram.com/zeza_bear
    </a>
  </div>

</footer>


<script>

function triggerAR(id) {

  const viewer = document.getElementById(id);

  if (!viewer) return;

  if (viewer.canActivateAR) {
    viewer.activateAR();
  } else {
    alert("อุปกรณ์นี้ไม่รองรับ AR หรือยังไม่พร้อมใช้งาน");
  }

}

</script>

</body>
</html>
